---

layout: page
title: Events
permalink: /events/

---

<h1 style="text-align:center;">Events</h1>

<div style="text-align:center; margin-bottom: 1em;">
  <label>Filter by Year:
    <select id="yearFilter">
      <option value="all">All</option>
      {% assign years = site.data.events | map: "year" | uniq | sort | reverse %}
      {% for year in years %}
        <option value="{{ year }}">{{ year }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Filter by Role:
    <select id="roleFilter">
      <option value="all">All</option>
      {% assign roles = site.data.events | map: "role" | uniq | sort %}
      {% for role in roles %}
        <option value="{{ role }}">{{ role }}</option>
      {% endfor %}
    </select>
  </label>
</div>

<ul id="eventList" class="event-list">
  {% for event in site.data.events %}
  <li class="event-item" data-year="{{ event.year }}" data-role="{{ event.role }}">
    <strong>{{ event.year }} | {{ event.event_type }}</strong> — 
    <em>{{ event.event_name }}</em><br>
    <strong>Role:</strong> {{ event.role }}<br>
    <strong>Remark:</strong> {{ event.remark }}
  </li>
  {% endfor %}
</ul>

<style>
  .event-list {
    list-style: none;
    padding: 0;
    max-width: 900px;
    margin: auto;
  }
  .event-item {
    background: #fff;
    padding: 1em;
    margin: 1em 0;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border-left: 5px solid #007ACC;
  }
</style>

<script>
  const yearFilter = document.getElementById('yearFilter');
  const roleFilter = document.getElementById('roleFilter');
  const eventItems = document.querySelectorAll('.event-item');

  function filterEvents() {
    const year = yearFilter.value;
    const role = roleFilter.value;

    eventItems.forEach(item => {
      const matchYear = (year === 'all' || item.dataset.year === year);
      const matchRole = (role === 'all' || item.dataset.role === role);
      item.style.display = (matchYear && matchRole) ? 'block' : 'none';
    });
  }

  yearFilter.addEventListener('change', filterEvents);
  roleFilter.addEventListener('change', filterEvents);
</script>
